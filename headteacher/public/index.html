<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Teacher Dashboard - School Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; }
        
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #0f1729 0%, #1a1a2e 50%, #0f3460 100%);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transition: transform 0.3s ease;
            z-index: 100;
            overflow-y: auto;
        }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .sidebar-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        
        .sidebar-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .sidebar-item.active { background: rgba(255,255,255,0.08); color: white; border-left-color: #60a5fa; }
        .sidebar-item i { width: 20px; text-align: center; font-size: 16px; }
        
        .main-content { margin-left: 260px; padding: 20px; min-height: 100vh; }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f1729 0%, #1a1a2e 50%, #0f3460 100%);
            padding: 20px;
        }
        
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-card h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.success { background: #d1fae5; color: #065f46; }
        .status-badge.warning { background: #fef3c7; color: #92400e; }
        .status-badge.danger { background: #fee2e2; color: #991b1b; }
        .status-badge.info { background: #dbeafe; color: #1e40af; }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 999;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 12px; }
            .mobile-menu-btn { display: block !important; }
        }
        .mobile-menu-btn { display: none; }
        
        .loading-spinner {
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-graduation-cap text-white text-3xl"></i>
                </div>
                <h1>Head Teacher Dashboard</h1>
                <p class="text-gray-500 text-sm mt-1">Complete School Management Overview</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="loginUsername" value="admin" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" value="admin123" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <button type="submit" id="loginBtn"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">
                    <i class="fas fa-sign-in-alt mr-2"></i> Login
                </button>
            </form>
            <p class="text-center text-xs text-gray-400 mt-4">
                <i class="fas fa-shield-alt mr-1"></i> Secure Access - Administration Only
            </p>
        </div>
    </div>
    
    <!-- Main Dashboard -->
    <div id="mainApp" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-school text-white text-lg"></i>
                    </div>
                    <div>
                        <p class="text-white font-bold text-sm">Head Teacher</p>
                        <p class="text-white/60 text-xs" id="sidebarSchoolName">Dashboard</p>
                    </div>
                </div>
            </div>
            <div class="py-4">
                <div class="sidebar-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i> Overview
                </div>
                <div class="sidebar-item" data-page="students">
                    <i class="fas fa-users"></i> Students
                </div>
                <div class="sidebar-item" data-page="financial">
                    <i class="fas fa-money-bill-wave"></i> Financial
                </div>
                <div class="sidebar-item" data-page="inventory">
                    <i class="fas fa-boxes"></i> Inventory
                </div>
                <div class="sidebar-item" data-page="uniform">
                    <i class="fas fa-tshirt"></i> Uniform
                </div>
                <div class="sidebar-item" data-page="academic">
                    <i class="fas fa-graduation-cap"></i> Academic
                </div>
                <div class="sidebar-item" data-page="staff">
                    <i class="fas fa-chalkboard-user"></i> Staff
                </div>
                <div class="sidebar-item" data-page="announcements">
                    <i class="fas fa-bullhorn"></i> Announcements
                </div>
                <div class="sidebar-item" data-page="settings">
                    <i class="fas fa-cog"></i> Settings
                </div>
            </div>
            <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-white/10">
                <div class="sidebar-item text-red-400 hover:text-red-300" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <button id="mobileMenuBtn" class="mobile-menu-btn fixed top-4 left-4 z-50 bg-white p-2 rounded-lg shadow-lg">
            <i class="fas fa-bars text-xl"></i>
        </button>
        
        <!-- Main Content -->
        <div class="main-content" id="mainContent">
            <div class="flex items-center justify-center h-64">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<script>
// ==================== STATE ====================
const state = {
    token: null,
    dashboardData: null,
    currentPage: 'dashboard'
};

// ==================== API HELPERS ====================
async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    
    const response = await fetch(endpoint, { ...options, headers });
    if (!response.ok) {
        const error = await response.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(error.error || 'Request failed');
    }
    return response.json();
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function formatCurrency(amount) {
    return Math.round(amount || 0).toLocaleString('en-US');
}

function formatDate(date) {
    return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

// ==================== LOGIN ====================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    
    const btn = document.getElementById('loginBtn');
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    btn.disabled = true;
    
    try {
        const result = await apiCall('/api/head/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        
        if (result.success) {
            state.token = result.token;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            showToast('Welcome to the Head Teacher Dashboard!', 'success');
            await loadDashboard();
        }
    } catch (error) {
        showToast('Login failed: ' + error.message, 'error');
    } finally {
        btn.innerHTML = original;
        btn.disabled = false;
    }
});

// ==================== LOGOUT ====================
document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await apiCall('/api/head/logout', { method: 'POST', body: JSON.stringify({ token: state.token }) }); } catch(e) {}
    state.token = null;
    state.dashboardData = null;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    showToast('Logged out', 'info');
});

// ==================== SIDEBAR NAVIGATION ====================
document.querySelectorAll('.sidebar-item[data-page]').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        navigateTo(item.dataset.page);
    });
});

document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// ==================== NAVIGATION ====================
async function navigateTo(page) {
    state.currentPage = page;
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `<div class="flex items-center justify-center h-64"><div class="loading-spinner"></div></div>`;
    
    try {
        switch(page) {
            case 'dashboard': await renderDashboard(); break;
            case 'students': await renderStudents(); break;
            case 'financial': await renderFinancial(); break;
            case 'inventory': await renderInventory(); break;
            case 'uniform': await renderUniform(); break;
            case 'academic': await renderAcademic(); break;
            case 'staff': await renderStaff(); break;
            case 'announcements': await renderAnnouncements(); break;
            case 'settings': await renderSettings(); break;
            default: await renderDashboard();
        }
    } catch (error) {
        mainContent.innerHTML = `
            <div class="bg-red-50 p-6 rounded-lg border border-red-200 text-center">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
                <p class="text-red-600 font-semibold">Error loading page</p>
                <p class="text-red-500 text-sm">${error.message}</p>
                <button onclick="navigateTo('${page}')" class="mt-3 bg-red-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-sync-alt"></i> Retry
                </button>
            </div>
        `;
    }
}

// ==================== LOAD DASHBOARD DATA ====================
async function loadDashboard() {
    try {
        const result = await apiCall('/api/head/dashboard');
        if (result.success) {
            state.dashboardData = result.data;
            
            // Update sidebar school name
            document.getElementById('sidebarSchoolName').textContent = 
                state.dashboardData.school?.name || 'School Dashboard';
            
            return state.dashboardData;
        }
    } catch (error) {
        showToast('Error loading dashboard data: ' + error.message, 'error');
        // Try cached data
        try {
            const cached = await apiCall('/api/head/dashboard/cached');
            if (cached.success) {
                state.dashboardData = cached.data;
                showToast('Using cached data', 'info');
                return cached.data;
            }
        } catch (e) {}
    }
    return null;
}

// ==================== RENDER DASHBOARD ====================
async function renderDashboard() {
    const mainContent = document.getElementById('mainContent');
    const data = state.dashboardData;
    
    if (!data) {
        await loadDashboard();
        if (!state.dashboardData) {
            mainContent.innerHTML = `<div class="text-center py-12"><i class="fas fa-database text-gray-400 text-5xl mb-4"></i><p class="text-gray-500">No data available</p></div>`;
            return;
        }
    }
    
    const d = state.dashboardData;
    const school = d.school || {};
    const students = d.students || {};
    const financial = d.financial || {};
    const inventory = d.inventory || {};
    const uniform = d.uniform || {};
    const academic = d.academic || {};
    const teachers = d.teachers || {};
    
    const html = `
        <div class="space-y-6">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-700 via-indigo-700 to-purple-700 rounded-2xl p-6 text-white">
                <div class="flex justify-between items-center flex-wrap gap-4">
                    <div>
                        <h1 class="text-2xl font-bold">${school.name || 'School Dashboard'}</h1>
                        <p class="text-sm opacity-90">${school.motto || ''} • ${school.termName || ''} ${school.currentYear || ''}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="refreshDashboard()" class="bg-white/20 backdrop-blur-sm px-4 py-2 rounded-lg text-sm hover:bg-white/30 transition">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button onclick="exportReport()" class="bg-white/20 backdrop-blur-sm px-4 py-2 rounded-lg text-sm hover:bg-white/30 transition">
                            <i class="fas fa-download"></i> Export Report
                        </button>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                    <div class="bg-white/10 rounded-lg p-3 backdrop-blur-sm">
                        <p class="text-xs opacity-75">Total Students</p>
                        <p class="text-2xl font-bold">${students.total || 0}</p>
                        <p class="text-xs opacity-75">👨 ${students.male || 0} 👩 ${students.female || 0}</p>
                    </div>
                    <div class="bg-white/10 rounded-lg p-3 backdrop-blur-sm">
                        <p class="text-xs opacity-75">Collection Rate</p>
                        <p class="text-2xl font-bold ${financial.collectionRate >= 80 ? 'text-green-400' : financial.collectionRate >= 50 ? 'text-yellow-400' : 'text-red-400'}">
                            ${financial.collectionRate || 0}%
                        </p>
                    </div>
                    <div class="bg-white/10 rounded-lg p-3 backdrop-blur-sm">
                        <p class="text-xs opacity-75">Inventory Items</p>
                        <p class="text-2xl font-bold">${inventory.totalItems || 0}</p>
                        <p class="text-xs opacity-75">📦 ${inventory.lowStock || 0} low stock</p>
                    </div>
                    <div class="bg-white/10 rounded-lg p-3 backdrop-blur-sm">
                        <p class="text-xs opacity-75">Staff</p>
                        <p class="text-2xl font-bold">${teachers.total || 0}</p>
                        <p class="text-xs opacity-75">${teachers.active || 0} active</p>
                    </div>
                </div>
            </div>
            
            <!-- Quick Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Active Students</p>
                            <p class="text-2xl font-bold">${students.active || 0}</p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-user-check text-green-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="mt-2 text-sm text-gray-500">${students.total || 0} total enrolled</div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Total Collected</p>
                            <p class="text-2xl font-bold">UGX ${formatCurrency(financial.totalCollected)}</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-money-bill-wave text-blue-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="mt-2 text-sm text-gray-500">${financial.totalTransactions || 0} transactions</div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Inventory Value</p>
                            <p class="text-2xl font-bold">UGX ${formatCurrency(inventory.totalValue)}</p>
                        </div>
                        <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-boxes text-purple-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="mt-2 text-sm text-gray-500">${inventory.totalItems || 0} items</div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Academic Avg</p>
                            <p class="text-2xl font-bold ${academic.averageScore >= 70 ? 'text-green-600' : academic.averageScore >= 50 ? 'text-yellow-600' : 'text-red-600'}">
                                ${academic.averageScore || 0}%
                            </p>
                        </div>
                        <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-graduation-cap text-orange-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="mt-2 text-sm text-gray-500">${academic.passedCount || 0} passed</div>
                </div>
            </div>
            
            <!-- Charts Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Grade Distribution -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h3 class="font-bold text-lg mb-4">📊 Grade Distribution</h3>
                    <div class="h-64">
                        <canvas id="gradeChart"></canvas>
                    </div>
                </div>
                
                <!-- Fee Collection by Structure -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h3 class="font-bold text-lg mb-4">💰 Fee Collection by Structure</h3>
                    <div class="h-64">
                        <canvas id="feeStructureChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Student Level & Inventory Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Students by Level -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h3 class="font-bold text-lg mb-4">🎓 Students by Level</h3>
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-sm">
                                <span>Nursery</span>
                                <span class="font-semibold">${students.byLevel?.Nursery || 0}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-pink-500 rounded-full h-2" style="width: ${students.total > 0 ? ((students.byLevel?.Nursery || 0) / students.total * 100) : 0}%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm">
                                <span>Lower Primary</span>
                                <span class="font-semibold">${students.byLevel?.LowerPrimary || 0}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-500 rounded-full h-2" style="width: ${students.total > 0 ? ((students.byLevel?.LowerPrimary || 0) / students.total * 100) : 0}%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm">
                                <span>Upper Primary</span>
                                <span class="font-semibold">${students.byLevel?.UpperPrimary || 0}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-purple-500 rounded-full h-2" style="width: ${students.total > 0 ? ((students.byLevel?.UpperPrimary || 0) / students.total * 100) : 0}%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Inventory Status -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h3 class="font-bold text-lg mb-4">📦 Inventory Status</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm">Available</span>
                            <span class="font-semibold text-green-600">${inventory.totalAvailable || 0}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm">Low Stock (&lt;5)</span>
                            <span class="font-semibold text-yellow-600">${inventory.lowStock || 0}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm">Out of Stock</span>
                            <span class="font-semibold text-red-600">${inventory.outOfStock || 0}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm">Uniform Items</span>
                            <span class="font-semibold">${uniform.totalItems || 0}</span>
                        </div>
                    </div>
                </div>

// ==================== INITIALIZE CHARTS ====================
function initializeCharts(data) {
    // Grade Distribution Chart
    const gradeCtx = document.getElementById('gradeChart');
    if (gradeCtx) {
        const grades = data.academic?.gradeDistribution || {};
        const labels = Object.keys(grades).sort();
        const values = labels.map(g => grades[g] || 0);
        
        const colors = {
            'A': '#22c55e', 'B': '#3b82f6', 'C': '#eab308', 
            'D': '#f59e0b', 'E': '#f97316', 'F': '#ef4444'
        };
        
        new Chart(gradeCtx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Students',
                    data: values,
                    backgroundColor: labels.map(g => colors[g] || '#94a3b8'),
                    borderRadius: 8,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const total = values.reduce((a, b) => a + b, 0);
                                const percentage = total > 0 ? ((context.raw / total) * 100).toFixed(1) : 0;
                                return `${context.raw} students (${percentage}%)`;
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    }
    
    // Fee Structure Chart
    const feeCtx = document.getElementById('feeStructureChart');
    if (feeCtx) {
        const structures = data.financial?.feeStructureStats || [];
        const labels = structures.map(s => s.name || 'Unnamed');
        const collected = structures.map(s => s.collected || 0);
        const expected = structures.map(s => s.expected || 0);
        
        new Chart(feeCtx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Collected',
                        data: collected,
                        backgroundColor: '#22c55e',
                        borderRadius: 4,
                        barPercentage: 0.4
                    },
                    {
                        label: 'Expected',
                        data: expected,
                        backgroundColor: '#e5e7eb',
                        borderRadius: 4,
                        barPercentage: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { usePointStyle: true }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                if (value >= 1000000) return 'UGX ' + (value / 1000000).toFixed(1) + 'M';
                                if (value >= 1000) return 'UGX ' + (value / 1000).toFixed(0) + 'K';
                                return 'UGX ' + value;
                            }
                        }
                    }
                }
            }
        });
    }
}

// ==================== EXPORT REPORT TYPE ====================
async function exportReportType(type) {
    try {
        showToast(`📊 Exporting ${type} report...`, 'info');
        const result = await apiCall(`/api/head/export/${type}`);
        if (result.success && result.data) {
            const csv = arrayToCSV(result.data);
            downloadCSV(csv, `${type}_report_${new Date().toISOString().split('T')[0]}.csv`);
            showToast(`✅ ${type} report exported successfully`, 'success');
        }
    } catch (error) {
        showToast('Error exporting: ' + error.message, 'error');
    }
}

function arrayToCSV(data) {
    if (!data || data.length === 0) return '';
    const headers = Object.keys(data[0]);
    const rows = data.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(','));
    return [headers.join(','), ...rows].join('\n');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

async function editStaff(id) {
    showToast('Edit functionality coming soon', 'info');
}

async function deleteStaff(id) {
    if (!confirm('Delete this staff member?')) return;
    try {
        const result = await apiCall(`/api/head/staff/${id}`, { method: 'DELETE' });
        if (result.success) {
            showToast('✅ Staff deleted', 'success');
            await renderStaff();
        }
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}
