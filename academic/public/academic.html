<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transition: transform 0.3s ease;
            z-index: 100;
            overflow-y: auto;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        .sidebar-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        
        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-left-color: #60a5fa;
        }
        
        .sidebar-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }
        
        .main-content {
            margin-left: 250px;
            padding: 20px;
            min-height: 100vh;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .login-card h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.active {
            background: #22c55e;
        }
        .status-dot.inactive {
            background: #ef4444;
        }
        .status-dot.pending {
            background: #eab308;
        }
        
        .score-input {
            width: 70px;
            padding: 4px 8px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .score-input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .score-input.pass {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        
        .score-input.fail {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .grade-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .grade-A { background: #d1fae5; color: #065f46; }
        .grade-B { background: #dbeafe; color: #1e40af; }
        .grade-C { background: #fef3c7; color: #92400e; }
        .grade-D { background: #fde68a; color: #78350f; }
        .grade-E { background: #fed7aa; color: #9a3412; }
        .grade-F { background: #fee2e2; color: #991b1b; }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .timetable-grid {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 1px;
            background: #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .timetable-grid .cell {
            background: white;
            padding: 8px 4px;
            text-align: center;
            font-size: 12px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .timetable-grid .header {
            background: #f3f4f6;
            font-weight: 600;
            font-size: 11px;
        }
        
        .timetable-grid .time-slot {
            background: #f3f4f6;
            font-weight: 600;
            font-size: 11px;
        }
        
        .timetable-grid .subject-cell {
            background: #eff6ff;
            border-radius: 4px;
            margin: 2px;
            padding: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .timetable-grid .subject-cell:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }
        
        .timetable-grid .subject-cell.break {
            background: #fef3c7;
            color: #92400e;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .modal-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 12px;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
        }
        
        .mobile-menu-btn {
            display: none;
        }
        
        .loading-spinner {
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 999;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        .toast.warning { background: #eab308; }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .print-hide {
            @media print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-graduation-cap text-white text-3xl"></i>
                </div>
                <h1>Academic System</h1>
                <p class="text-gray-500 text-sm mt-1">Class Management & Report Cards</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="loginUsername" required
                               class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                               placeholder="Enter username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="loginPassword" required
                               class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                               placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" id="loginBtn"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition duration-200">
                    <i class="fas fa-sign-in-alt mr-2"></i> Login
                </button>
            </form>
            
            <p class="text-center text-xs text-gray-400 mt-4">
                <i class="fas fa-info-circle"></i> Contact admin for credentials
            </p>
        </div>
    </div>
    
    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-lg"></i>
                    </div>
                    <div>
                        <p class="text-white font-bold text-sm">Academic System</p>
                        <p class="text-white/60 text-xs" id="sidebarTeacherName">Teacher</p>
                    </div>
                </div>
            </div>
            
            <div class="py-4">
                <div class="sidebar-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </div>
                <div class="sidebar-item" data-page="students">
                    <i class="fas fa-users"></i> My Students
                </div>
                <div class="sidebar-item" data-page="timetable">
                    <i class="fas fa-calendar-alt"></i> Timetable
                </div>
                <div class="sidebar-item" data-page="sweeping">
                    <i class="fas fa-broom"></i> Sweeping Roster
                </div>
                <div class="sidebar-item" data-page="scores">
                    <i class="fas fa-pen-fancy"></i> Enter Scores
                </div>
                <div class="sidebar-item" data-page="report-cards">
                    <i class="fas fa-file-alt"></i> Report Cards
                </div>
                <div class="sidebar-item" data-page="templates">
                    <i class="fas fa-palette"></i> Templates
                </div>
                <div class="sidebar-item" data-page="grading">
                    <i class="fas fa-chart-bar"></i> Grading Scale
                </div>
                <div class="sidebar-item" data-page="progression">
                    <i class="fas fa-arrow-up"></i> Progression
                </div>
                <div class="sidebar-item" data-page="settings">
                    <i class="fas fa-cog"></i> Settings
                </div>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-white/10">
                <div class="sidebar-item text-red-400 hover:text-red-300" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu Toggle -->
        <button id="mobileMenuBtn" class="mobile-menu-btn fixed top-4 left-4 z-50 bg-white p-2 rounded-lg shadow-lg">
            <i class="fas fa-bars text-xl"></i>
        </button>
        
        <!-- Main Content -->
        <div class="main-content" id="mainContent">
            <!-- Content will be rendered here -->
            <div class="flex items-center justify-center h-64">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
// ==================== GLOBAL STATE ====================
const state = {
    token: null,
    teacher: null,
    currentPage: 'dashboard',
    students: [],
    classes: [],
    subjects: [],
    reportCards: [],
    gradingScales: {},
    templates: {},
    terms: {},
    timetable: null,
    sweepingRoster: null,
    selectedStudent: null,
    selectedReportCard: null
};

// ==================== API HELPERS ====================
async function apiCall(endpoint, options = {}) {
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers
    };
    
    if (state.token) {
        headers['Authorization'] = `Bearer ${state.token}`;
    }
    
    const response = await fetch(endpoint, {
        ...options,
        headers
    });
    
    if (!response.ok) {
        const error = await response.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(error.error || 'Request failed');
    }
    
    return response.json();
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function formatDate(date) {
    return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

function getGrade(score, gradingScale) {
    if (!gradingScale) return { grade: 'N/A', color: 'gray' };
    
    for (const [grade, data] of Object.entries(gradingScale)) {
        if (score >= data.min && score <= data.max) {
            return { grade, color: data.color || 'gray', description: data.description || '' };
        }
    }
    return { grade: 'N/A', color: 'gray' };
}

function calculateAverage(scores) {
    if (!scores || scores.length === 0) return 0;
    const validScores = scores.filter(s => s.score !== undefined && s.score !== null);
    if (validScores.length === 0) return 0;
    const total = validScores.reduce((sum, s) => sum + parseFloat(s.score || 0), 0);
    return Math.round(total / validScores.length);
}

function getPosition(students, studentId) {
    const sorted = [...students].sort((a, b) => {
        const avgA = calculateAverage(a.subjects || []);
        const avgB = calculateAverage(b.subjects || []);
        return avgB - avgA;
    });
    const index = sorted.findIndex(s => s.studentId === studentId);
    return index !== -1 ? index + 1 : null;
}

// ==================== LOGIN ====================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    
    const loginBtn = document.getElementById('loginBtn');
    const originalText = loginBtn.innerHTML;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    loginBtn.disabled = true;
    
    try {
        const result = await apiCall('/api/academic/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        
        if (result.success) {
            state.token = result.token;
            state.teacher = result.teacher;
            
            document.getElementById('sidebarTeacherName').textContent = 
                `${result.teacher.firstName} ${result.teacher.lastName}`;
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            showToast(`Welcome ${result.teacher.firstName}!`, 'success');
            
            // Load data
            await loadTeacherData();
            await navigateTo('dashboard');
        }
    } catch (error) {
        showToast(error.message || 'Login failed', 'error');
    } finally {
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
    }
});

// ==================== LOGOUT ====================
document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
        await apiCall('/api/academic/logout', {
            method: 'POST',
            body: JSON.stringify({ token: state.token })
        });
    } catch (e) {}
    
    state.token = null;
    state.teacher = null;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    showToast('Logged out successfully', 'info');
});

// ==================== SIDEBAR NAVIGATION ====================
document.querySelectorAll('.sidebar-item[data-page]').forEach(item => {
    item.addEventListener('click', () => {
        const page = item.dataset.page;
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        navigateTo(page);
    });
});

// Mobile menu toggle
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// ==================== NAVIGATION ====================
async function navigateTo(page) {
    state.currentPage = page;
    
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `
        <div class="flex items-center justify-center h-64">
            <div class="loading-spinner"></div>
        </div>
    `;
    
    try {
        switch(page) {
            case 'dashboard':
                await renderDashboard();
                break;
            case 'students':
                await renderStudents();
                break;
            case 'timetable':
                await renderTimetable();
                break;
            case 'sweeping':
                await renderSweepingRoster();
                break;
            case 'scores':
                await renderScores();
                break;
            case 'report-cards':
                await renderReportCards();
                break;
            case 'templates':
                await renderTemplates();
                break;
            case 'grading':
                await renderGradingScale();
                break;
            case 'progression':
                await renderProgression();
                break;
            case 'settings':
                await renderSettings();
                break;
            default:
                await renderDashboard();
        }
    } catch (error) {
        mainContent.innerHTML = `
            <div class="bg-red-50 p-6 rounded-lg border border-red-200 text-center">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
                <p class="text-red-600 font-semibold">Error loading page</p>
                <p class="text-red-500 text-sm">${error.message}</p>
                <button onclick="navigateTo('${page}')" class="mt-3 bg-red-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-sync-alt"></i> Retry
                </button>
            </div>
        `;
    }
}

// ==================== LOAD TEACHER DATA ====================
async function loadTeacherData() {
    try {
        // Load students
        const students = await apiCall('/api/academic/students');
        state.students = students || [];
        
        // Load classes
        const classes = await apiCall('/api/academic/classes');
        state.classes = classes || [];
        
        // Load subjects
        const subjects = await apiCall('/api/academic/subjects');
        state.subjects = subjects || [];
        
        // Load report cards
        const reportCards = await apiCall(`/api/academic/report-cards/${state.teacher.classId}/${state.terms.currentTerm || 1}/${state.terms.currentYear || new Date().getFullYear()}`);
        state.reportCards = reportCards || [];
        
        // Load grading scales
        const scales = await apiCall('/api/academic/grading-scales');
        state.gradingScales = scales || {};
        
        // Load templates
        const templates = await apiCall('/api/academic/report-templates');
        state.templates = templates || {};
        
        // Load terms
        const terms = await apiCall('/api/academic/terms');
        state.terms = terms || {};
        
        // Load timetable
        const timetable = await apiCall(`/api/academic/timetable/${state.teacher.classId}/${state.terms.currentTerm || 1}/${state.terms.currentYear || new Date().getFullYear()}`);
        state.timetable = timetable || null;
        
        // Load sweeping roster
        const roster = await apiCall(`/api/academic/sweeping-roster/${state.teacher.classId}/${state.terms.currentTerm || 1}/${state.terms.currentYear || new Date().getFullYear()}`);
        state.sweepingRoster = roster || null;
        
        console.log('✅ Teacher data loaded:', {
            students: state.students.length,
            classes: state.classes.length,
            subjects: state.subjects.length,
            reportCards: state.reportCards.length
        });
    } catch (error) {
        console.error('Error loading teacher data:', error);
        showToast('Error loading data: ' + error.message, 'error');
    }
}

// ==================== RENDER FUNCTIONS ====================

// ==================== DASHBOARD ====================
async function renderDashboard() {
    const mainContent = document.getElementById('mainContent');
    const teacher = state.teacher;
    const classStudents = state.students.filter(s => s.currentClassId === teacher.classId);
    const term = state.terms.currentTerm || 1;
    const year = state.terms.currentYear || new Date().getFullYear();
    
    // Calculate statistics
    const totalStudents = classStudents.length;
    const reportCards = state.reportCards || [];
    const hasReportCards = reportCards.length > 0;
    
    let averageScore = 0;
    let passedCount = 0;
    let failedCount = 0;
    let gradeDistribution = {};
    let subjectStats = {};
    
    if (hasReportCards) {
        const grades = state.gradingScales.default || {};
        
        reportCards.forEach(card => {
            let total = 0;
            let count = 0;
            
            (card.subjects || []).forEach(subj => {
                total += subj.score || 0;
                count++;
                
                // Subject stats
                if (!subjectStats[subj.subjectName]) {
                    subjectStats[subj.subjectName] = { scores: [], total: 0, count: 0 };
                }
                subjectStats[subj.subjectName].scores.push(subj.score || 0);
                subjectStats[subj.subjectName].total += subj.score || 0;
                subjectStats[subj.subjectName].count++;
            });
            
            const avg = count > 0 ? total / count : 0;
            if (avg >= 50) passedCount++;
            else failedCount++;
            
            // Grade distribution
            for (const [grade, data] of Object.entries(grades)) {
                if (avg >= data.min && avg <= data.max) {
                    gradeDistribution[grade] = (gradeDistribution[grade] || 0) + 1;
                    break;
                }
            }
        });
        
        averageScore = reportCards.reduce((sum, card) => {
            let total = 0;
            let count = 0;
            (card.subjects || []).forEach(subj => {
                total += subj.score || 0;
                count++;
            });
            return sum + (count > 0 ? total / count : 0);
        }, 0) / reportCards.length || 0;
    }
    
    // Subject averages
    const subjectAverages = Object.entries(subjectStats).map(([name, data]) => ({
        name,
        average: data.count > 0 ? Math.round(data.total / data.count) : 0,
        count: data.count
    })).sort((a, b) => b.average - a.average);
    
    // Top performing subjects
    const topSubjects = subjectAverages.slice(0, 3);
    const lowSubjects = subjectAverages.slice(-3).reverse();
    
    const html = `
        <div class="space-y-6">

// ==================== SCORE FUNCTIONS ====================
let scoreChanges = [];

function updateScore(input, studentId, subjectId) {
    const value = parseInt(input.value);
    if (isNaN(value) || value < 0 || value > 100) {
        showToast('Score must be between 0 and 100', 'error');
        input.value = '';
        return;
    }
    
    // Mark as changed
    const key = `${studentId}_${subjectId}`;
    const existing = scoreChanges.find(c => c.key === key);
    if (existing) {
        existing.score = value;
    } else {
        scoreChanges.push({ key, studentId, subjectId, score: value });
    }
    
    // Update row colors
    const row = input.closest('tr');
    const avgCell = row.querySelector('td:nth-last-child(3)');
    const gradeCell = row.querySelector('td:nth-last-child(2)');
    
    // Get all scores for this student
    const inputs = row.querySelectorAll('.score-input');
    let total = 0;
    let count = 0;
    inputs.forEach(inp => {
        const val = parseInt(inp.value);
        if (!isNaN(val)) {
            total += val;
            count++;
        }
    });
    const avg = count > 0 ? Math.round(total / count) : 0;
    const grade = getGrade(avg, state.gradingScales.default || {});
    
    avgCell.textContent = count > 0 ? avg + '%' : '-';
    avgCell.className = `p-2 text-center font-bold ${avg >= 70 ? 'text-green-600' : avg >= 50 ? 'text-yellow-600' : 'text-red-600'}`;
    
    gradeCell.innerHTML = count > 0 ? `<span class="px-2 py-1 rounded-full text-xs font-bold grade-${grade.grade}">${grade.grade}</span>` : '-';
}

async function saveAllScores() {
    if (scoreChanges.length === 0) {
        showToast('No changes to save', 'info');
        return;
    }
    
    const teacher = state.teacher;
    const term = parseInt(document.getElementById('scoreTerm')?.value || state.terms.currentTerm || 1);
    const year = parseInt(document.getElementById('scoreYear')?.value || state.terms.currentYear || new Date().getFullYear());
    
    // Group by student
    const studentScores = {};
    scoreChanges.forEach(change => {
        if (!studentScores[change.studentId]) {
            studentScores[change.studentId] = [];
        }
        studentScores[change.studentId].push({
            subjectId: change.subjectId,
            score: change.score
        });
    });
    
    // Get subject names
    const subjects = state.subjects;
    
    const cards = Object.entries(studentScores).map(([studentId, scores]) => {
        const subjectData = scores.map(s => {
            const subject = subjects.find(sub => sub.id === s.subjectId);
            return {
                subjectId: s.subjectId,
                subjectName: subject?.name || 'Unknown',
                score: s.score
            };
        });
        
        return {
            studentId,
            classId: teacher.classId,
            term,
            year,
            subjects: subjectData,
            teacherComment: '',
            recommendation: ''
        };
    });
    
    try {
        const result = await apiCall('/api/academic/report-cards/bulk', {
            method: 'POST',
            body: JSON.stringify({ cards })
        });
        
        if (result.success) {
            showToast(`✅ ${result.count} student report cards saved`, 'success');
            scoreChanges = [];
            
            // Refresh report cards
            const reportCards = await apiCall(`/api/academic/report-cards/${teacher.classId}/${term}/${year}`);
            state.reportCards = reportCards || [];
            
            // Reload scores view
            await renderScores();
        }
    } catch (error) {
        showToast('Error saving scores: ' + error.message, 'error');
    }
}

function autoCalculatePositions() {
    const teacher = state.teacher;
    const term = parseInt(document.getElementById('scoreTerm')?.value || state.terms.currentTerm || 1);
    const year = parseInt(document.getElementById('scoreYear')?.value || state.terms.currentYear || new Date().getFullYear());
    
    const reportCards = state.reportCards.filter(rc => 
        rc.classId === teacher.classId && 
        rc.term === term && 
        rc.year === year
    );
    
    if (reportCards.length === 0) {
        showToast('No report cards found to calculate positions', 'info');
        return;
    }
    
    // Sort by average
    const sorted = [...reportCards].sort((a, b) => {
        const avgA = calculateAverage(a.subjects || []);
        const avgB = calculateAverage(b.subjects || []);
        return avgB - avgA;
    });
    
    // Update positions in UI
    const rows = document.querySelectorAll('#scoresTable tbody tr');
    let position = 1;
    let prevAvg = -1;
    let prevPosition = 1;
    
    rows.forEach((row, idx) => {
        const avgCell = row.querySelector('td:nth-last-child(3)');
        const avg = parseInt(avgCell.textContent);
        
        let pos = position;
        if (avg === prevAvg && prevAvg >= 0) {
            pos = prevPosition;
        } else {
            prevPosition = position;
        }
        
        const posCell = row.querySelector('td:last-child');
        posCell.textContent = avg > 0 ? '#' + pos : '-';
        posCell.className = 'p-2 text-center font-bold';
        
        prevAvg = avg;
        position++;
    });
    
    showToast('Positions calculated', 'success');
}

// ==================== CHANGE PASSWORD ====================
async function changePassword() {
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (newPassword !== confirmPassword) {
        showToast('New passwords do not match', 'error');
        return;
    }
    
    if (newPassword.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
    }
    
    try {
        const result = await apiCall('/api/academic/change-password', {
            method: 'POST',
            body: JSON.stringify({
                token: state.token,
                currentPassword,
                newPassword
            })
        });
        
        if (result.success) {
            showToast('✅ Password changed successfully', 'success');
            document.getElementById('changePasswordForm').reset();
        }
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

        layout: document.getElementById('templateLayout').value,
        subjects: { show: document.getElementById('templateShowSubjects').checked },
        summary: { show: document.getElementById('templateShowSummary').checked },
        footer: { teacherComment: true, recommendation: true, signature: true }
    };
    
    try {
        const result = await apiCall('/api/academic/report-templates', {
            method: 'POST',
            body: JSON.stringify({ name, template })
        });
        
        if (result.success) {
            showToast('✅ Template created successfully', 'success');
            document.querySelector('.modal-overlay').remove();
            await loadTeacherData();
            await renderTemplates();
        }
    } catch (error) {
        showToast('Error creating template: ' + error.message, 'error');
    }
}

// ==================== GRADING SCALE FUNCTIONS ====================
function addGradeRow() {
    const container = document.getElementById('gradingScaleFields');
    const row = document.createElement('div');
    row.className = 'grid grid-cols-5 gap-2 items-center mb-2';
    row.innerHTML = `
        <input type="text" class="border rounded px-2 py-1 text-center font-bold w-12" placeholder="A+" value="A+">
        <input type="number" class="border rounded px-2 py-1 text-center" placeholder="Min" min="0" max="100" value="90">
        <input type="number" class="border rounded px-2 py-1 text-center" placeholder="Max" min="0" max="100" value="100">
        <input type="text" class="border rounded px-2 py-1" placeholder="Description" value="Outstanding">
        <button type="button" onclick="this.closest('.grid').remove()" class="text-red-600 hover:text-red-800">
            <i class="fas fa-trash"></i>
        </button>
    `;
    container.appendChild(row);
}

async function saveGradingScale() {
    const rows = document.querySelectorAll('#gradingScaleFields .grid');
    const scale = {};
    
    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const grade = inputs[0].value.trim().toUpperCase();
        const min = parseInt(inputs[1].value);
        const max = parseInt(inputs[2].value);
        const description = inputs[3].value.trim();
        
        if (grade && !isNaN(min) && !isNaN(max)) {
            scale[grade] = { min, max, description, points: 0 };
        }
    });
    
    if (Object.keys(scale).length === 0) {
        showToast('No valid grades entered', 'error');
        return;
    }
    
    try {
        const result = await apiCall('/api/academic/grading-scales', {
            method: 'POST',
            body: JSON.stringify({ name: 'default', scale })
        });
        
        if (result.success) {
            showToast('✅ Grading scale saved successfully', 'success');
            state.gradingScales.default = scale;
            await renderGradingScale();
        }
    } catch (error) {
        showToast('Error saving grading scale: ' + error.message, 'error');
    }
}

function removeGrade(grade) {
    if (!confirm(`Remove grade "${grade}"?`)) return;
    
    const row = document.querySelector(`input[value="${grade}"]`)?.closest('.grid');
    if (row) row.remove();
}

// ==================== PROGRESSION FUNCTIONS ====================
function toggleAllStudents() {
    const checked = document.getElementById('selectAllStudents').checked;
    document.querySelectorAll('.student-checkbox').forEach(cb => cb.checked = checked);
}

async function promoteSelected() {
    const selected = document.querySelectorAll('.student-checkbox:checked');
    if (selected.length === 0) {
        showToast('Please select students to promote', 'error');
        return;
    }
    
    const studentIds = Array.from(selected).map(cb => cb.dataset.studentId);
    const data = window._progressionData;
    const nextClassId = data.nextClass?.id;
    
    if (!nextClassId) {
        showToast('No higher class available for promotion', 'error');
        return;
    }
    
    if (!confirm(`Promote ${studentIds.length} student(s) to ${data.nextClass.name}?`)) {
        return;
    }
    
    try {
        const result = await apiCall('/api/academic/promote-students', {
            method: 'POST',
            body: JSON.stringify({
                studentIds,
                fromClassId: data.currentClass?.id,
                toClassId: nextClassId,
                academicYear: data.year,
                term: data.term
            })
        });
        
        if (result.success) {
            showToast(`✅ ${studentIds.length} students promoted to ${data.nextClass.name}`, 'success');
            // Refresh data
            await loadTeacherData();
            await renderProgression();
        }
    } catch (error) {
        showToast('Error promoting students: ' + error.message, 'error');
    }
}

async function retainSelected() {
    const selected = document.querySelectorAll('.student-checkbox:checked');
    if (selected.length === 0) {
        showToast('Please select students to retain', 'error');
        return;
    }
    
    const studentIds = Array.from(selected).map(cb => cb.dataset.studentId);
    const data = window._progressionData;
    
    if (!confirm(`Retain ${studentIds.length} student(s) in ${data.currentClass?.name}?`)) {
        return;
    }
    
    try {
        const result = await apiCall('/api/academic/retain-students', {
            method: 'POST',
            body: JSON.stringify({
                studentIds,
                fromClassId: data.currentClass?.id,
                academicYear: data.year,
                term: data.term
            })
        });
        
        if (result.success) {
            showToast(`✅ ${studentIds.length} students retained in ${data.currentClass?.name}`, 'success');
            await loadTeacherData();
            await renderProgression();
        }
    } catch (error) {
        showToast('Error retaining students: ' + error.message, 'error');
    }
}

// ==================== SCORE FUNCTIONS ====================
async function loadScores() {
    const term = parseInt(document.getElementById('scoreTerm')?.value || state.terms.currentTerm || 1);
    const year = parseInt(document.getElementById('scoreYear')?.value || state.terms.currentYear || new Date().getFullYear());
    
    try {
        const reportCards = await apiCall(`/api/academic/report-cards/${state.teacher.classId}/${term}/${year}`);
        state.reportCards = reportCards || [];
        scoreChanges = [];
        await renderScores();
        showToast(`✅ Loaded scores for ${getTermName(term)} ${year}`, 'success');
    } catch (error) {
        showToast('Error loading scores: ' + error.message, 'error');
    }
}

// ==================== STUDENT SCORE FUNCTIONS ====================
function enterStudentScores(studentId) {
    const student = state.students.find(s => s.id === studentId);
    if (!student) {
        showToast('Student not found', 'error');
        return;
    }
    
    // Navigate to scores and focus on this student
    navigateTo('scores');
    setTimeout(() => {
        const table = document.getElementById('scoresTable');
        if (table) {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const name = row.querySelector('td:first-child')?.textContent.trim();
                if (name === `${student.firstName} ${student.lastName}`) {
                    row.style.backgroundColor = '#fef3c7';
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => {
                        const inputs = row.querySelectorAll('.score-input');
                        if (inputs.length > 0) inputs[0].focus();
                    }, 300);
                }
            });
        }
    }, 500);
}
